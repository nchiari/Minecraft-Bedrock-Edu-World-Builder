<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minecraft Bedrock/Edu World Builder</title>
  <meta name="description" content="Build a new .mcworld file with embedded .mcpack/.mcaddon packs for Minecraft Bedrock and Education.">
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
  <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

  <header class="hero container">
    <h1 class="hero-title">Minecraft Bedrock/Edu World Builder</h1>
    <div class="hero-subline">
      <p class="hero-subtitle" data-i18n="app.subtitle"></p>
      <button id="howto-open" type="button" class="howto-link" data-i18n="help.open"></button>
    </div>

    <div class="lang-switch" role="group" aria-label="Language selector">
      <button type="button" class="lang-btn" data-lang="en">EN</button>
      <button type="button" class="lang-btn" data-lang="es">ES</button>
    </div>
  </header>

  <main class="container layout">
    <section class="panel panel-input" aria-labelledby="upload-title">
      <h2 id="upload-title" data-i18n="upload.title"></h2>

      <div class="field">
        <label for="world-input" data-i18n="upload.worldLabel"></label>
        <div class="file-picker">
          <input id="world-input" class="file-native" type="file" accept=".mcworld,application/octet-stream">
          <button id="world-picker-btn" type="button" class="btn btn-file" data-i18n="upload.chooseWorld"></button>
          <span id="world-picker-text" class="file-picker-text" data-i18n="upload.noWorldChosen"></span>
        </div>
        <p class="field-help" data-i18n="upload.worldHelp"></p>
        <p id="world-file-info" class="field-file"></p>
      </div>

      <div class="field">
        <label for="packs-input" data-i18n="upload.packsLabel"></label>
        <div class="file-picker">
          <input id="packs-input" class="file-native" type="file" multiple accept=".mcpack,.mcaddon,application/octet-stream">
          <button id="packs-picker-btn" type="button" class="btn btn-file" data-i18n="upload.choosePacks"></button>
          <span id="packs-picker-text" class="file-picker-text" data-i18n="upload.noPacksChosen"></span>
        </div>
        <p class="field-help" data-i18n="upload.packsHelp"></p>
        <p id="packs-file-info" class="field-file"></p>
      </div>

      <div class="limits-box">
        <h3 data-i18n="limits.title"></h3>
        <p id="limits-copy"></p>
      </div>

      <div class="actions">
        <button id="compile-btn" type="button" class="btn btn-primary" data-i18n="actions.compile"></button>
        <button id="reset-btn" type="button" class="btn btn-ghost" data-i18n="actions.reset"></button>
      </div>
    </section>

    <section class="panel panel-status" aria-labelledby="status-title">
      <h2 id="status-title" data-i18n="status.title"></h2>
      <p id="status-summary" class="status-summary" data-i18n="status.idle"></p>
      <div id="download-box" class="download-box" hidden>
        <p id="download-note" class="download-note"></p>
        <button id="download-btn" type="button" class="btn btn-primary" data-i18n="actions.download"></button>
      </div>
      <ul id="status-log" class="status-log" aria-live="polite"></ul>
    </section>
  </main>

  <div id="howto-modal" class="modal" hidden aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="howto-title">
    <div id="howto-overlay" class="modal-overlay"></div>
    <div class="modal-card">
      <h2 id="howto-title" data-i18n="help.title"></h2>
      <p class="modal-intro" data-i18n="help.intro"></p>
      <ol class="modal-steps">
        <li data-i18n="help.step1"></li>
        <li data-i18n="help.step2"></li>
        <li data-i18n="help.step3"></li>
      </ol>
      <p class="modal-note" data-i18n="help.note"></p>
      <button id="howto-close" type="button" class="btn btn-primary" data-i18n="help.close"></button>
    </div>
  </div>

  <footer class="container footer">
    <p data-i18n="footer.note"></p>
    <p class="footer-credit">
      <span data-i18n="footer.copyright"></span>
      <span class="footer-sep">|</span>
      <a href="https://github.com/nchiari" target="_blank" rel="noopener noreferrer">GitHub</a>
      <span class="footer-sep">|</span>
      <a href="https://www.linkedin.com/in/nicochiari/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <span class="footer-sep">|</span>
      <a id="feedback-link" href="https://www.linkedin.com/in/nicochiari/" target="_blank" rel="noopener noreferrer" data-i18n="footer.feedback"></a>
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
